apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  namespace: flask-app
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app  
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers: 
        - name: flask-app
          image: abdulahad9049/flask-app-k8s:v1
          ports:
            - containerPort: 5000
          envFrom:
              - configMapRef:
                  name: mysql-config
              - secretRef:
                  name: mysql-secret